[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  # Firebase Configuration - Set these in Netlify dashboard environment variables
  # Never commit actual API keys to version control
  # Set REACT_APP_FIREBASE_API_KEY in the Netlify dashboard environment variables
  
  # Configure secrets scanning to ignore Firebase configuration values
  # These are public configuration values, not secret keys
  SECRETS_SCAN_OMIT_KEYS = "REACT_APP_FIREBASE_API_KEY,REACT_APP_FIREBASE_AUTH_DOMAIN,REACT_APP_FIREBASE_PROJECT_ID,REACT_APP_FIREBASE_STORAGE_BUCKET,REACT_APP_FIREBASE_MESSAGING_SENDER_ID,REACT_APP_FIREBASE_APP_ID,REACT_APP_FIREBASE_MEASUREMENT_ID,REACT_APP_GOOGLE_CLIENT_ID"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com https://*.firebaseio.com https://*.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebase.google.com https://*.firebaseapp.com; img-src 'self' https://www.gstatic.com https://lh3.googleusercontent.com data:; style-src 'self' 'unsafe-inline'; font-src 'self'; frame-src https://accounts.google.com https://*.firebaseapp.com"
